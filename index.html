```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokédex</title>
    <meta name="description" content="Pokédex interativa com busca, filtros, favoritos e modo escuro.">

    <!-- Normalize CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/pokedex.css">
</head>

<body>

    <noscript>
        <p style="text-align:center; padding:20px;">
            Você precisa ativar JavaScript para usar a Pokédex.
        </p>
    </noscript>

    <!-- Botão Dark Mode -->
    <button 
        class="theme-toggle"
        id="themeToggle"
        title="Alternar tema"
        aria-label="Alternar tema">
        🌙
    </button>

    <main class="content">

        <header class="header">
            <h1>Pokédex</h1>
        </header>

        <!-- CONTROLES -->
        <section class="controls-container">

            <label for="searchInput" class="sr-only">Buscar Pokémon</label>
            <input
                type="text"
                id="searchInput"
                placeholder="Buscar Pokémon..."
                autocomplete="off">

            <label for="typeFilter" class="sr-only">Filtrar por tipo</label>
            <select id="typeFilter">
                <option value="">Todos os tipos</option>
                <option value="normal">Normal</option>
                <option value="grass">Grass</option>
                <option value="fire">Fire</option>
                <option value="water">Water</option>
                <option value="electric">Electric</option>
                <option value="ice">Ice</option>
                <option value="ground">Ground</option>
                <option value="flying">Flying</option>
                <option value="poison">Poison</option>
                <option value="fighting">Fighting</option>
                <option value="psychic">Psychic</option>
                <option value="dark">Dark</option>
                <option value="rock">Rock</option>
                <option value="bug">Bug</option>
                <option value="ghost">Ghost</option>
                <option value="steel">Steel</option>
                <option value="dragon">Dragon</option>
                <option value="fairy">Fairy</option>
            </select>

            <label for="sortSelect" class="sr-only">Ordenar pokémons</label>
            <select id="sortSelect">
                <option value="number">Ordenar por Número</option>
                <option value="name">Ordenar por Nome</option>
                <option value="type">Ordenar por Tipo</option>
            </select>

            <button id="favoritesBtn" class="favorites-btn">
                ❤️ Favoritos
            </button>

        </section>

        <!-- ERROS -->
        <div id="errorContainer"></div>

        <!-- LISTA DE POKÉMONS -->
        <ol id="pokemonList" class="pokemons"></ol>

        <!-- PAGINAÇÃO -->
        <div class="pagination">
            <button id="loadMoreButton">
                Carregar mais
            </button>
        </div>

    </main>

    <!-- MODAL -->
    <div 
        id="pokemonModal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle">

        <div class="modal-content">

            <div class="modal-header">
                <h2 id="modalTitle">Pokémon</h2>

                <button
                    id="modalClose"
                    class="modal-close"
                    aria-label="Fechar modal">
                    &times;
                </button>
            </div>

            <div class="modal-body">

                <div class="modal-image">
                    <img
                        id="modalImage"
                        src=""
                        alt="Imagem do Pokémon selecionado">
                </div>

                <div class="modal-info">

                    <div class="modal-info-group">
                        <label>Número:</label>
                        <p id="modalNumber">#000</p>
                    </div>

                    <div class="modal-info-group">
                        <label>Tipos:</label>
                        <p id="modalTypes">-</p>
                    </div>

                    <div class="modal-info-group">
                        <label>Altura:</label>
                        <p id="modalHeight">-</p>
                    </div>

                    <div class="modal-info-group">
                        <label>Peso:</label>
                        <p id="modalWeight">-</p>
                    </div>

                </div>

            </div>

            <div id="modalStats"></div>

        </div>

    </div>

    <!-- SCRIPTS (ORDEM IMPORTANTE) -->
    <script src="assets/js/pokemon-model.js"></script>
    <script src="assets/js/poke-api.js"></script>
    <script src="assets/js/main.js"></script>

</body>
</html>
```
